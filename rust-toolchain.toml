# Pinned toolchain for reproducible builds.
# Bumped only by explicit ADR; rationale and procedure documented in
# docs/decisions/0001-rust-first.md and docs/onboarding.md.
#
# 1.91.0 chosen because rusty-kaspa tn10-toc3 declares rust-version = "1.91.0"
# in its workspace Cargo.toml; staying on the same MSRV avoids subtle
# differences when we vendor and extend their bridge crate. Bump procedure:
# docs/decisions/0017-kaspa-version-pinning.md.
[toolchain]
channel = "1.91.0"
components = ["rustfmt", "clippy", "rust-docs", "rust-src"]
targets = ["x86_64-unknown-linux-gnu", "x86_64-unknown-linux-musl"]
profile = "minimal"
