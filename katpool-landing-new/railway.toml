# Monorepo: set service Root Directory to /katpool-landing-new and Config File path to
# /katpool-landing-new/railway.toml in Railway service settings.
[build]
builder = "RAILPACK"
watchPatterns = ["/katpool-landing-new/**"]

[deploy]
healthcheckPath = "/api/hello"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
