name: security

# Scheduled supply-chain and vulnerability scans. Runs weekly plus
# on-demand. CI's per-PR gates already cover deny + audit; this
# workflow runs the same plus longer-running scans (Trivy filesystem
# + container) and exists to catch advisories that land in upstream
# databases between PRs.

on:
  schedule:
    # Sundays at 06:00 UTC. After the DR validator (04:00 UTC Sun).
    - cron: "0 6 * * 0"
  workflow_dispatch:

permissions: {}

env:
  CARGO_TERM_COLOR: always

jobs:
  # Advisories are handled by cargo-deny below, against the same
  # RustSec database. cargo-audit as a separate scan is intentionally
  # omitted; see ci.yml for the same rationale.

  deny:
    name: cargo-deny (scheduled)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: cargo-deny
        uses: EmbarkStudios/cargo-deny-action@a531616d8ce3b9177443e48a1159bc945a099823 # v2.0.19
        with:
          log-level: warn
          command: check
          arguments: --all-features

  trivy-fs:
    name: trivy filesystem scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write # for SARIF upload
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run Trivy (filesystem, vuln + config + secret)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
          # Don't fail on transitive findings we already track via
          # deny.toml; CI's `deny` job is authoritative for those.
          skip-files: Cargo.lock
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs
