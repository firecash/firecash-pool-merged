# katpool fly.io anycast stratum edge (ADR-0022).
#
# Role: thin per-region TCP forwarder. fly's anycast routes each miner to
# the nearest machine; fly's `proxy_proto` handler prepends a PROXY v2
# header carrying the real miner IP. HAProxy `accept-proxy` consumes that
# header, then `send-proxy-v2` re-emits it to the NetCup origin so the
# katpool bridge recovers the real client IP for anti-abuse + attribution.
#
# Port mapping (mainnet co-residency): the public stratum ports stay the
# canonical 1111-8888, but each is forwarded to origin port +20000
# (1111 -> 21111, ... 8888 -> 28888). The new mainnet pool listens on
# 21111-28888 because the legacy pool still owns 1111-8888 on the origin
# host during the transition. The origin's per-port difficulty seed keys on
# the local listening port, so the new pool's KATPOOL_STRATUM_PORTS maps
# 21111:256 ... 28888:2048 to preserve the legacy seed bands.
#
# POST-CUTOVER: once the legacy pool is decommissioned and frees 1111-8888,
# the new pool can rebind to those defaults; at that point change the origin
# ports below back to a 1:1 map (1111 -> 1111, ...). Until then, keep +20000.
#
# KATPOOL_ORIGIN_HOST must be set in the machine environment (fly secret),
# e.g. `kas-origin.katpool.com` — a DNS name that resolves to the NetCup
# origin's real IP and is NOT the public/anycast name (avoid a loop).

global
    log stdout format raw local0 info
    # fly machines cap the file-descriptor hard limit at 10240; HAProxy reserves
    # ~2 FDs per connection, so maxconn must stay well under ~5000 or it ALERTs
    # ("Cannot raise FD limit") and crash-loops. 4096/machine across the 7 anycast
    # regions = ~28k aggregate capacity (>> the ~10k legacy peak). Re-verify per-
    # region headroom in the pre-cutover load test; raise the machine nofile (or
    # scale machines) before the full-fleet .xyz cutover if any region saturates.
    maxconn 4096
    # No privileged ops needed; run as the image's haproxy user.

defaults
    mode tcp
    log global
    option tcplog
    option dontlognull
    # Stratum connections are long-lived: a miner holds the socket open and
    # exchanges jobs/shares for hours. Generous client/server timeouts; the
    # connect timeout stays short to fail over quickly if the origin is down.
    timeout connect 10s
    timeout client  1h
    timeout server  1h
    retries 3
    # Resolve the origin via libc at boot, but don't refuse to start if DNS
    # is briefly unavailable (resolve lazily instead). Also lets the image
    # `haproxy -c` check pass without resolving a real origin name.
    default-server init-addr last,libc,none

# ---------------------------------------------------------------------------
# One frontend + backend per stratum port. The frontend binds the canonical
# PUBLIC port (1111-8888) with `accept-proxy` (reads the PROXY v2 header fly
# prepends); the backend `send-proxy-v2` + `check-send-proxy` forwards it (and
# health checks) to the origin's +20000 port so the bridge always gets a
# header and the correct per-port difficulty seed.
# ---------------------------------------------------------------------------

frontend ft_1111
    bind :1111 accept-proxy
    default_backend bk_1111
backend bk_1111
    server origin "${KATPOOL_ORIGIN_HOST}:21111" send-proxy-v2 check check-send-proxy

frontend ft_2222
    bind :2222 accept-proxy
    default_backend bk_2222
backend bk_2222
    server origin "${KATPOOL_ORIGIN_HOST}:22222" send-proxy-v2 check check-send-proxy

frontend ft_3333
    bind :3333 accept-proxy
    default_backend bk_3333
backend bk_3333
    server origin "${KATPOOL_ORIGIN_HOST}:23333" send-proxy-v2 check check-send-proxy

frontend ft_4444
    bind :4444 accept-proxy
    default_backend bk_4444
backend bk_4444
    server origin "${KATPOOL_ORIGIN_HOST}:24444" send-proxy-v2 check check-send-proxy

frontend ft_5555
    bind :5555 accept-proxy
    default_backend bk_5555
backend bk_5555
    server origin "${KATPOOL_ORIGIN_HOST}:25555" send-proxy-v2 check check-send-proxy

frontend ft_6666
    bind :6666 accept-proxy
    default_backend bk_6666
backend bk_6666
    server origin "${KATPOOL_ORIGIN_HOST}:26666" send-proxy-v2 check check-send-proxy

frontend ft_7777
    bind :7777 accept-proxy
    default_backend bk_7777
backend bk_7777
    server origin "${KATPOOL_ORIGIN_HOST}:27777" send-proxy-v2 check check-send-proxy

frontend ft_8888
    bind :8888 accept-proxy
    default_backend bk_8888
backend bk_8888
    server origin "${KATPOOL_ORIGIN_HOST}:28888" send-proxy-v2 check check-send-proxy

# ---------------------------------------------------------------------------
# Legacy MiningPoolStats HTTP API (miningpoolstats.stream). Plain TCP — no
# PROXY v2 (HTTP clients do not send it). Forwards to origin nginx on :8080,
# which proxies /api/pool/miningPoolStats to the new pool API. Keeps
# kas.katpool.xyz on the anycast IP for stratum while reviving the legacy URL.
# ---------------------------------------------------------------------------
frontend ft_8080
    bind :8080
    default_backend bk_8080
backend bk_8080
    server origin "${KATPOOL_ORIGIN_HOST}:8080" check
