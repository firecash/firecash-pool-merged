# Loki single-binary config (B4) — Grafana Loki 3.x, filesystem-backed.
#
# Sized for one small pool, not a cluster: single replica, in-memory ring,
# TSDB v13 index on a Railway volume. The origin ships logs here (the unified
# runtime emits structured JSON when KATPOOL_LOG_FORMAT=json — katpool-telemetry)
# via a shipper (Promtail/Alloy/vector) configured operator-side.
#
# Mount a persistent Railway volume at /loki (path_prefix below).

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: info

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

query_range:
  results_cache:
    cache:
      embedded_cache:
        enabled: true
        max_size_mb: 100

limits_config:
  retention_period: 720h # 30 days (matches SLO.md log-retention policy)
  allow_structured_metadata: true
  volume_enabled: true
  ingestion_rate_mb: 8
  ingestion_burst_size_mb: 16
  reject_old_samples: true
  reject_old_samples_max_age: 168h

# Compactor enforces retention by deleting expired chunks.
compactor:
  working_directory: /loki/retention
  delete_request_store: filesystem
  retention_enabled: true
  retention_delete_delay: 2h
  compaction_interval: 10m

# Loki's ruler can alert on log patterns (e.g. payout/treasury log lines that
# have no Prometheus metric yet) and route through the same Alertmanager.
ruler:
  storage:
    type: local
    local:
      directory: /loki/rules
  rule_path: /loki/rules-temp
  alertmanager_url: http://alertmanager.railway.internal:9093
  enable_api: true
