# Blackbox exporter modules for katpool synthetic probes (B5).
# Targets + relabeling live in victoria-metrics/scrape.yml; this file defines
# the probe behavior. The exporter runs in the Railway project and probes the
# pool's PUBLIC surface, so a failure reflects what a real miner/dashboard sees.

modules:
  # HTTP GET expecting 2xx — used for /health /ready /started and the indexer
  # health endpoints. IPv4+IPv6, follow redirects, TLS verified.
  http_2xx:
    prober: http
    timeout: 5s
    http:
      valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
      valid_status_codes: [] # default: any 2xx
      method: GET
      follow_redirects: true
      preferred_ip_protocol: ip4
      ip_protocol_fallback: true
      fail_if_ssl: false
      fail_if_not_ssl: true

  # Plain TCP connect — used for the stratum mining ports behind the anycast
  # edge. Proves the port accepts a connection; it does not speak stratum.
  tcp_connect:
    prober: tcp
    timeout: 5s
    tcp:
      preferred_ip_protocol: ip4
      ip_protocol_fallback: true
