# Root Directory = ops/railway/observability ; Config File = deploy/ntfy/railway.toml
# Volume mounted at /var/cache/ntfy; set RAILWAY_RUN_UID=0 for volume writes.
# Public domain (operator-provided) → :80; set NTFY_BASE_URL to match.
[build]
builder = "DOCKERFILE"
dockerfilePath = "deploy/ntfy/Dockerfile"
watchPatterns = ["deploy/ntfy/**"]

[deploy]
healthcheckPath = "/v1/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
numReplicas = 1
