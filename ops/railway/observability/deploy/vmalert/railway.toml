# Root Directory = ops/railway/observability ; Config File = deploy/vmalert/railway.toml
[build]
builder = "DOCKERFILE"
dockerfilePath = "deploy/vmalert/Dockerfile"
watchPatterns = ["victoria-metrics/rules/**", "deploy/vmalert/**"]

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
numReplicas = 1
