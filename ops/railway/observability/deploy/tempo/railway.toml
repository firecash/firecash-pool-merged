# Root Directory = ops/railway/observability ; Config File = deploy/tempo/railway.toml
# Volume mounted at /var/tempo; set RAILWAY_RUN_UID=0 for volume writes.
[build]
builder = "DOCKERFILE"
dockerfilePath = "deploy/tempo/Dockerfile"
watchPatterns = ["tempo/**", "deploy/tempo/**"]

[deploy]
healthcheckPath = "/ready"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
numReplicas = 1
