# Root Directory = ops/railway/observability ; Config File = deploy/vmauth/railway.toml
# Public domain (operator-provided) terminates here; proxies the write path to
# the private VictoriaMetrics service after basic auth.
[build]
builder = "DOCKERFILE"
dockerfilePath = "deploy/vmauth/Dockerfile"
watchPatterns = ["deploy/vmauth/**"]

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
numReplicas = 1
