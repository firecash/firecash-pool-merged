# Root Directory = ops/railway/observability ; Config File = deploy/grafana/railway.toml
# Volume mounted at /var/lib/grafana (Grafana DB); set RAILWAY_RUN_UID=0 so the
# non-root Grafana image can write it. Public domain via GF_SERVER_ROOT_URL.
[build]
builder = "DOCKERFILE"
dockerfilePath = "deploy/grafana/Dockerfile"
watchPatterns = ["grafana/**", "deploy/grafana/**"]

[deploy]
healthcheckPath = "/api/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
numReplicas = 1
