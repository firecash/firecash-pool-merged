# Root Directory = ops/railway/observability ; Config File = deploy/alertmanager/railway.toml
# Volume mounted at /alertmanager; set RAILWAY_RUN_UID=0 for volume writes.
[build]
builder = "DOCKERFILE"
dockerfilePath = "deploy/alertmanager/Dockerfile"
watchPatterns = ["alertmanager/**", "deploy/alertmanager/**"]

[deploy]
healthcheckPath = "/-/healthy"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
numReplicas = 1
