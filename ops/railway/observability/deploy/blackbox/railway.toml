# Root Directory = ops/railway/observability ; Config File = deploy/blackbox/railway.toml
# Internal only (VM scrapes it over private DNS); no volume, no public domain.
[build]
builder = "DOCKERFILE"
dockerfilePath = "deploy/blackbox/Dockerfile"
watchPatterns = ["blackbox/**", "deploy/blackbox/**"]

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
numReplicas = 1
