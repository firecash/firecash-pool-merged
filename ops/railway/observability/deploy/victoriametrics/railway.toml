# Railway service config (config-as-code). In service settings set:
#   Root Directory  = ops/railway/observability
#   Config File     = deploy/victoriametrics/railway.toml
# Region (Singapore) + volume + variables are applied by deploy/provision.sh.
[build]
builder = "DOCKERFILE"
dockerfilePath = "deploy/victoriametrics/Dockerfile"
watchPatterns = ["victoria-metrics/scrape.yml", "deploy/victoriametrics/**"]

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
numReplicas = 1
