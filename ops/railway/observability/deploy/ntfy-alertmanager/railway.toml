# Root Directory = ops/railway/observability ; Config File = deploy/ntfy-alertmanager/railway.toml
# Stateless bridge; no volume, internal only (Alertmanager posts to it).
[build]
builder = "DOCKERFILE"
dockerfilePath = "deploy/ntfy-alertmanager/Dockerfile"
watchPatterns = ["deploy/ntfy-alertmanager/**"]

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
numReplicas = 1
