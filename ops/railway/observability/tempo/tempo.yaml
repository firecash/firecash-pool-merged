# Tempo single-binary (monolithic) config (B4) — Grafana Tempo 2.x, local
# storage. Receives OTLP/gRPC spans from the unified runtime, which exports them
# when KATPOOL_OTLP_ENDPOINT is set (katpool-telemetry → this distributor on
# :4317). Mount a persistent Railway volume at /var/tempo.
#
# YAML indentation is strict; Tempo refuses to start on a misindented block.

stream_over_http_enabled: true

server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: "0.0.0.0:4317"
        http:
          endpoint: "0.0.0.0:4318"

ingester:
  max_block_duration: 5m

compactor:
  compaction:
    # Trace retention (matches SLO.md). Cheap: traces are sampled and short-TTL.
    block_retention: 336h # 14 days

storage:
  trace:
    backend: local
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks

usage_report:
  reporting_enabled: false
