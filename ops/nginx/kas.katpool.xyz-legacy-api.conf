# Legacy MiningPoolStats feed compatibility (pre-cutover v1 pool).
#
# miningpoolstats.stream polls:
#   http://kas.katpool.xyz:8080/api/pool/miningPoolStats
#
# Traffic path (kas.katpool.xyz stays on the fly anycast IP for stratum):
#   miner/MPS client -> fly :8080 (plain TCP) -> origin :8080 (this vhost)
#   -> loopback :18081/api/pool/miningPoolStats
#
# Deploy the fly edge change in ops/edge/flyio/ (port 8080 in fly.toml +
# haproxy.cfg) before expecting the public legacy URL to work.
server {
    listen 8080;
    listen [::]:8080;
    server_name kas.katpool.xyz;

    client_max_body_size 64k;

    location /api/pool/miningPoolStats {
        proxy_pass http://127.0.0.1:18081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }
}
