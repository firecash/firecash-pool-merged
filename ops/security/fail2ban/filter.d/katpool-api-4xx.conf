# fail2ban filter — a burst of 4xx responses from one client against the
# katpool read-only HTTP API, read from the host nginx access log (combined
# format). This is the OS-level backstop for the in-process per-IP rate limit
# (tower-governor, ADR-0021): the limiter returns 429s cheaply, and a client
# that keeps hammering past it earns an nftables drop so it stops costing the
# box anything.
#
# `<HOST>` is fail2ban's IP capture. Matches any 4xx on any method/path; tune
# the threshold in the jail, not here.

[Definition]

failregex = ^<HOST> -[^"]*"(?:GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH|CONNECT|TRACE)[^"]*" 4\d\d

ignoreregex =
