# katpool host jails (Phase 7/8 edge hardening; ADR-0021, ADR-0008,
# threat-model.md). Install per ops/security/fail2ban/README.md. Bans are
# applied with nftables — the origin already runs nftables for the stratum
# firewall (ops/edge/flyio/nftables/), so no iptables dependency is introduced.

[DEFAULT]
banaction   = nftables-multiport
banaction_allports = nftables-allports
# Never ban loopback, or the same-origin dashboard BFF / anycast edge egress
# IPs: dashboard traffic arrives as ONE source IP, so without this an edge blip
# could ban every viewer at once. Append the BFF/edge egress IP(s) per
# deployment (space-separated).
ignoreip    = 127.0.0.1/8 ::1

# OS-level backstop to the in-process API rate limiter (ADR-0021). The limiter
# already 429s abusive clients cheaply; this bans one that ignores the limit and
# keeps generating 4xx. maxretry is deliberately high so legitimate 404s / a
# single misbehaving page do not trip it — only a sustained burst does.
[katpool-api-4xx]
enabled  = true
port     = http,https
filter   = katpool-api-4xx
# Point at the host nginx access log that fronts api-<network>.katpool.com.
logpath  = /var/log/nginx/access.log
findtime = 1m
maxretry = 100
bantime  = 1h

# Keys-only SSH per ADR-0008 / custody.md (the treasury account is `nologin`).
# This bans password-guess / scanner bursts against the deploy/operator accounts.
[sshd]
enabled  = true
findtime = 10m
maxretry = 4
bantime  = 1h
