; katpool-hardening.conf — treasury-credential delivery + OS isolation for
; the main katpool runtime (payout-kas / payout-krc20).
;
; This is the systemd half of the custody model in `docs/custody.md` §3 and
; ADR-0008. It is a drop-in fragment, not a standalone unit: copy it into the
; katpool service's drop-in directory so its directives merge over the base
; unit.
;
; Installation
;
;   sudo install -d -o root -g root -m 0755 \
;       /etc/systemd/system/katpool.service.d
;   sudo install -m 0644 katpool-hardening.conf \
;       /etc/systemd/system/katpool.service.d/hardening.conf
;   sudo systemctl daemon-reload && sudo systemctl restart katpool
;
; Verify exposure with `systemd-analyze security katpool` (target: SAFE).
;
; ---------------------------------------------------------------------
; Treasury credential: sops/age (at rest) -> systemd-creds (at boot)
; ---------------------------------------------------------------------
; The key lives in git as `ops/secrets/secrets.sops.yaml` (age-encrypted,
; ADR-0003). systemd's LoadCredentialEncrypted= consumes a *systemd-creds*
; blob, NOT the sops file — these are two different encryption layers. At
; deploy time the operator bridges them once (see runbooks/11-key-rotation):
;
;   sops --decrypt --extract '["treasury"]["kas_private_key_hex"]' \
;        ops/secrets/secrets.sops.yaml > /run/treasury-key.hex
;   systemd-creds encrypt --name=treasury-key \
;        /run/treasury-key.hex /etc/katpool/treasury-key.cred
;   shred -u /run/treasury-key.hex
;
; At boot systemd decrypts the .cred (TPM2- or host-key-bound) into the
; per-service credentials tmpfs. `katpool-secrets::load_from_systemd_credential`
; then reads the 64-hex-char plaintext from $CREDENTIALS_DIRECTORY/treasury-key.
; The plaintext never touches disk or env, only the credentials tmpfs.

[Service]
; Identity — unprivileged, no shell account, no inherited supplementary groups.
DynamicUser=no
User=katpool
Group=katpool
SupplementaryGroups=

; Credential delivery (see header). The plaintext key appears at
; $CREDENTIALS_DIRECTORY/treasury-key for this service only.
LoadCredentialEncrypted=treasury-key:/etc/katpool/treasury-key.cred

; Privilege containment — the process can never gain a capability.
NoNewPrivileges=yes
CapabilityBoundingSet=
AmbientCapabilities=
RestrictSUIDSGID=yes
RemoveIPC=yes
KeyringMode=private

; Filesystem — read-only world, one writable state carve-out.
ProtectSystem=strict
ProtectHome=yes
PrivateTmp=yes
PrivateDevices=yes
PrivateMounts=yes
ReadOnlyPaths=/etc/katpool
StateDirectory=katpool
StateDirectoryMode=0750
ProtectProc=invisible
ProcSubset=pid

; Memory — mlock'd treasury page must never reach swap; W^X denied.
; The katpool-secrets crate mlock(2)s the key; swap is also disabled at the
; OS level (defence in depth). 32 bytes fits comfortably in the default
; RLIMIT_MEMLOCK, but pin a generous limit so signing buffers can lock too.
MemoryDenyWriteExecute=yes
LockPersonality=yes
RestrictRealtime=yes
LimitMEMLOCK=1M

; Namespaces + kernel surface.
PrivateUsers=yes
RestrictNamespaces=yes
ProtectKernelTunables=yes
ProtectKernelModules=yes
ProtectKernelLogs=yes
ProtectClock=yes
ProtectControlGroups=yes
ProtectHostname=yes

; Network — loopback only by default (kaspad gRPC + local Postgres are on
; localhost). Outbound to kasplex/kaspa.org/Backblaze/Railway is opened via
; IPAddressAllow= in a separate drop-in, never here.
RestrictAddressFamilies=AF_INET AF_INET6 AF_UNIX
IPAddressDeny=any
IPAddressAllow=localhost

; Syscall surface — daemon baseline minus privileged/footgun groups.
SystemCallArchitectures=native
SystemCallFilter=@system-service
SystemCallFilter=~@privileged @resources @raw-io @reboot @swap @cpu-emulation @obsolete
SystemCallErrorNumber=EPERM

; Misc.
UMask=0077
